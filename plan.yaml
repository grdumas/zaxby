  - id: RPOPC-712
    jira_created: true
    type: epic
    title: Create Multi-Arch Team Performance Engineering Dashboard
    description: '# Summary


      A Python Dash dashboard for visualizing software performance benchmark results from OpenSearch. Track performance regressions across OS versions, compare against peer operating systems, and analyze cloud scaling behavior.


      # Project Context


      Broadly speaking, the ongoing efforts to realize Continuous Performance Testing (CPT) for Public Cloud and RHEL Multi-Arch are broken up into the following segments:


      1. Provision systems for test runs

      2. Run tests

      3. Process test results for d...'
    source: jira
    source_ref: https://redhat.atlassian.net/browse/RPOPC-712
    status: in_progress
    priority: high
    depends_on: []
