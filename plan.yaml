  - id: RPOPC-1051
    jira_created: true
    type: subtask
    title: Fix FIO processor exceeding OpenSearch 5000 field limit on baremetal testbed
    description: '## Reported By


      Matt Lucius (Slack)


      ## Problem


      FIO results from nightly protoCPT runs on baremetal testbed are failing to upload to OpenSearch with a "5000 field limit exceeded" error.


      ## Root Cause


      Chronicler''s FIO processor is ingesting ALL result files instead of just the final aggregated results:


      * **48 per-knob-combination results files** (soon to be 96)

      * **Per-second "in flight" logs** (typically only used for troubleshooting)


      This causes the document to balloon beyond OpenSearch...'
    source: jira
    source_ref: https://redhat.atlassian.net/browse/RPOPC-1051
    status: blocked
    priority: high
    depends_on: []
    branch: feat/rpopc-1051-fix-fio-processor-exceeding-opensearch-5000-field
    pr: null
    parent: RPOPC-1047
    notes: Agent exited without AGENT_DONE signal
